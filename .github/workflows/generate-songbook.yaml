name: Generate Songbook

on:
  workflow_dispatch:
    inputs:
      edition:
        description: "The songbook edition to generate (e.g., 'current')"
        type: string
        required: true
  workflow_call:
    inputs:
      edition:
        description: "The songbook edition to generate"
        required: true
        type: string

permissions:
  contents: read

env:
  USE_GHOSTSCRIPT_COMPRESSION: false

jobs:
  generate-songbook:
    name: Generate Songbook (${{ inputs.edition }})
    runs-on: ubuntu-latest
    concurrency:
      group: generate-songbook-${{ inputs.edition }}
      cancel-in-progress: false
    outputs:
      effective_edition: ${{ steps.set-output-names.outputs.effective_edition }}
    steps:
    - name: Checkout repository
      id: checkout
      uses: actions/checkout@v4

    - name: Load environment variables
      id: load-env
      uses: falti/dotenv-action@v1.1.4
      with:
        path: .env
        export-variables: true
        keys-case: bypass

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      id: setup-sdk
      run: gcloud config set project ${{ env.GCP_PROJECT_ID }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Trigger and poll for completion
      id: trigger-and-poll
      run: |
        PAYLOAD=$(jq -n --arg edition "${{ inputs.edition }}" '{ edition: $edition }')
        echo "Triggering songbook generation with payload: $PAYLOAD"
        API_URL="https://${{ env.GCP_REGION }}-${{ env.GCP_PROJECT_ID }}.cloudfunctions.net/${{ env.API_FUNCTION_NAME }}"

        RESPONSE=$(curl -s -f -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$API_URL")
        echo "API Response: $RESPONSE"
        JOB_ID=$(echo "$RESPONSE" | jq -r '.job_id')

        if [[ "$JOB_ID" == "null" || -z "$JOB_ID" ]]; then
          echo "Failed to create job"
          exit 1
        fi
        echo "Created job with ID: $JOB_ID"

        TIMEOUT=120
        ELAPSED=0
        POLL_INTERVAL=1
        SOURCE_GCS_PATH=""

        while [[ $ELAPSED -lt $TIMEOUT ]]; do
          sleep $POLL_INTERVAL
          ELAPSED=$((ELAPSED + POLL_INTERVAL))

          STATUS_RESPONSE=$(curl -s "$API_URL/$JOB_ID")
          STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status')
          PROGRESS=$(echo "$STATUS_RESPONSE" | jq -r '.progress // 0')
          MESSAGE=$(echo "$STATUS_RESPONSE" | jq -r '.last_message // ""')
          PROGRESS_PERCENT=$(echo "$PROGRESS * 100" | bc -l | awk '{printf "%.0f", $1 + 0.5}')

          echo "[$ELAPSED/${TIMEOUT}s] Status: $STATUS, Progress: ${PROGRESS_PERCENT}%, Message: $MESSAGE"

          if [[ "$STATUS" == "completed" ]]; then
            echo "✅ Songbook generation completed successfully!"
            SOURCE_GCS_PATH="gs://${GCS_CDN_BUCKET}/${JOB_ID}/songbook.pdf"
            MANIFEST_GCS_PATH="gs://${GCS_CDN_BUCKET}/${JOB_ID}/manifest.json"
            echo "source_gcs_path=${SOURCE_GCS_PATH}" >> $GITHUB_OUTPUT
            echo "manifest_gcs_path=${MANIFEST_GCS_PATH}" >> $GITHUB_OUTPUT
            break
          elif [[ "$STATUS" == "failed" ]]; then
            echo "❌ Songbook generation failed"
            echo "Full response: $STATUS_RESPONSE"
            exit 1
          fi
        done

        if [[ -z "$SOURCE_GCS_PATH" ]]; then
          echo "⏰ Timeout reached after ${TIMEOUT} seconds"
          exit 1
        fi

    - name: Download Manifest
      run: |
        MANIFEST_GCS_PATH="${{ steps.trigger-and-poll.outputs.manifest_gcs_path }}"
        echo "Downloading generation manifest from ${MANIFEST_GCS_PATH}"
        gcloud storage cp "${MANIFEST_GCS_PATH}" manifest.json

    - name: Set output names from manifest
      id: set-output-names
      run: |
        EDITION_ID=$(jq -r '.edition.id // empty' manifest.json)
        if [[ -z "$EDITION_ID" ]]; then
          EDITION_ID="${{ inputs.edition }}"
        fi
        PDF_BASENAME="ukulele-tuesday-songbook-${EDITION_ID}-$(date -u +%Y-%m-%d)"
        echo "OUTPUT_PDF=${PDF_BASENAME}.pdf" >> $GITHUB_ENV
        echo "OUTPUT_MANIFEST=${PDF_BASENAME}.manifest.json" >> $GITHUB_ENV
        echo "effective_edition=${EDITION_ID}" >> $GITHUB_OUTPUT
        mv manifest.json "${PDF_BASENAME}.manifest.json"

    - name: Install Ghostscript
      if: env.USE_GHOSTSCRIPT_COMPRESSION == 'true'
      id: install-ghostscript
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript

    - name: Download uncompressed PDF
      if: env.USE_GHOSTSCRIPT_COMPRESSION == 'false'
      run: |
        SOURCE_GCS_PATH="${{ steps.trigger-and-poll.outputs.source_gcs_path }}"
        echo "Downloading generated PDF from ${SOURCE_GCS_PATH} to ${{ env.OUTPUT_PDF }}"
        gcloud storage cp "${SOURCE_GCS_PATH}" "${{ env.OUTPUT_PDF }}"

    - name: Post-process PDF
      if: env.USE_GHOSTSCRIPT_COMPRESSION == 'true'
      id: post-process
      run: |
        SOURCE_GCS_PATH="${{ steps.trigger-and-poll.outputs.source_gcs_path }}"
        INPUT_PDF="uncompressed.pdf"

        echo "Downloading generated PDF from ${SOURCE_GCS_PATH} to ${INPUT_PDF}"
        gcloud storage cp "${SOURCE_GCS_PATH}" "${INPUT_PDF}"

        echo "Compressing PDF with Ghostscript..."
        gs -sDEVICE=pdfwrite \
          -dCompatibilityLevel=1.4 \
          -dPDFSETTINGS=/default \
          -dSubsetFonts=false \
          -dEmbedAllFonts=true \
          -dDetectDuplicateImages=true \
          -dNOPAUSE -dBATCH \
          -sOutputFile="${{ env.OUTPUT_PDF }}" \
          "${INPUT_PDF}"

    - name: Validate Generated PDF
      run: |
        set -e
        echo "Validating generated PDF: ${{ env.OUTPUT_PDF }}"
        echo "Using manifest file: ${{ env.OUTPUT_MANIFEST }}"

        # Use enhanced validation with manifest
        uv run songbook-tools validate-pdf "${{ env.OUTPUT_PDF }}" \
          --manifest "${{ env.OUTPUT_MANIFEST }}" \
          --verbose

        echo "✅ PDF validation passed for ${{ steps.set-output-names.outputs.effective_edition }} edition"

    - name: Upload Songbook Artifact
      uses: actions/upload-artifact@v4
      with:
        name: songbook-artifact-${{ steps.set-output-names.outputs.effective_edition }}
        path: |
          ${{ env.OUTPUT_PDF }}
          ${{ env.OUTPUT_MANIFEST }}

  publish-songbooks:
    name: Publish Songbook and Manifest
    runs-on: ubuntu-latest
    needs: [generate-songbook]
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout repository
      id: checkout
      uses: actions/checkout@v4
    - name: Load environment variables
      id: load-env
      uses: falti/dotenv-action@v1.1.4
      with:
        path: .env
        export-variables: true
        keys-case: bypass

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      id: setup-sdk
      run: gcloud config set project ${{ env.GCP_PROJECT_ID }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Download songbook artifact
      uses: actions/download-artifact@v4
      with:
        path: ./songbooks
        name: songbook-artifact-${{ needs.generate-songbook.outputs.effective_edition }}

    - name: Upload PDF to GCS
      id: upload-pdf
      run: |
        set -e
        EDITION="${{ needs.generate-songbook.outputs.effective_edition }}"
        PDF_FILE=$(find ./songbooks -name '*.pdf' -print -quit)
        if [ -f "$PDF_FILE" ]; then
          FILENAME=$(basename "$PDF_FILE")
          DEST_GCS_PATH="gs://${GCS_SONGBOOKS_BUCKET}/${EDITION}/${FILENAME}"
          echo "Uploading '$FILENAME' to '$DEST_GCS_PATH'"
          gcloud storage cp "$PDF_FILE" "$DEST_GCS_PATH"
        else
          echo "No PDF file found in artifact."
          exit 1
        fi

    - name: Upload Manifest to GCS and create latest.json
      run: |
        set -e
        EDITION="${{ needs.generate-songbook.outputs.effective_edition }}"
        PDF_FILE=$(find ./songbooks -name '*.pdf' -print -quit)
        PDF_FILENAME=$(basename "$PDF_FILE")
        MANIFEST_FILE=$(find ./songbooks -name '*.manifest.json' -print -quit)
        MANIFEST_FILENAME=$(basename "$MANIFEST_FILE")

        if [ -f "$MANIFEST_FILE" ]; then
          DEST_GCS_PATH="gs://${GCS_SONGBOOKS_BUCKET}/${EDITION}/${MANIFEST_FILENAME}"
          echo "Uploading '${MANIFEST_FILENAME}' to '${DEST_GCS_PATH}'"
          gcloud storage cp "$MANIFEST_FILE" "$DEST_GCS_PATH" --cache-control="public, max-age=600"
          echo "✅ Successfully uploaded manifest"

          echo "Generating latest.json"
          LATEST_JSON_FILE="latest.json"
          EDITION_YAML="generator/config/songbooks/${EDITION}.yaml"

          VISIBILITY=$(python3 -c "import yaml; cfg=yaml.safe_load(open('$EDITION_YAML')); print(cfg.get('publish',{}).get('visibility','public'))" 2>/dev/null || echo "public")
          PINNED=$(python3 -c "import yaml; cfg=yaml.safe_load(open('$EDITION_YAML')); print('true' if cfg.get('publish',{}).get('pinned',False) else 'false')" 2>/dev/null || echo "false")

          jq -n \
            --arg pdf_filename "$PDF_FILENAME" \
            --arg manifest_filename "$MANIFEST_FILENAME" \
            --arg generated_at "$(date -u --iso-8601=seconds)" \
            --arg visibility "$VISIBILITY" \
            --argjson pinned "$PINNED" \
            '{pdf_filename: $pdf_filename, manifest_filename: $manifest_filename, generated_at: $generated_at, visibility: $visibility, pinned: $pinned}' \
            > "$LATEST_JSON_FILE"

          cat "$LATEST_JSON_FILE"
          DEST_LATEST_JSON_PATH="gs://${GCS_SONGBOOKS_BUCKET}/${EDITION}/latest.json"
          echo "Uploading latest.json to ${DEST_LATEST_JSON_PATH}"
          gcloud storage cp "$LATEST_JSON_FILE" "$DEST_LATEST_JSON_PATH" --cache-control="public, max-age=60"
          echo "✅ Successfully uploaded latest.json"
        else
          echo "Manifest file not found, skipping upload."
          exit 1
        fi
