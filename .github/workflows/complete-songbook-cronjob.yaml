name: Complete Songbook Cronjob

on:
  schedule:
    # Run every hour
    - cron: "0 * * * *"
  workflow_dispatch: {} # For manual runs

permissions: {}

jobs:
  generate-complete-songbook:
    name: Generate Complete Songbook
    uses: ./.github/workflows/generate-songbook.yaml
    with:
      edition: "complete"
    secrets: inherit
