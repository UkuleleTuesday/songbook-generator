name: Trigger Tag Updater

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to target (sends to drive-file-changes-pr-{N} topic)'
        required: true
        type: string
      file_identifier:
        description: 'Google Drive file ID or file name (partial match supported)'
        required: true
        type: string

jobs:
  trigger-tagupdater:
    name: Publish Test File Change to Tag Updater
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup GCP and dependencies
      uses: ./.github/actions/setup-gcp-deps
      with:
        gcp_sa_key: ${{ secrets.GCP_SA_KEY }}
        gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

    - name: Resolve file and write message
      run: uv run python scripts/resolve_drive_file.py "${{ github.event.inputs.file_identifier }}" > /tmp/pubsub_message.json

    - name: Publish to Pub/Sub
      run: |
        TOPIC="${{ env.DRIVE_CHANGES_PUBSUB_TOPIC }}-pr-${{ github.event.inputs.pr_number }}"
        echo "Publishing to topic: ${TOPIC}"
        echo "Message: $(cat /tmp/pubsub_message.json)"
        gcloud pubsub topics publish "${TOPIC}" \
          --project="${{ env.GCP_PROJECT_ID }}" \
          --message="$(cat /tmp/pubsub_message.json)"
