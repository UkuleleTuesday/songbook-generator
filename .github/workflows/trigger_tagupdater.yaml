name: Trigger Tag Updater

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to target (sends to drive-file-changes-pr-{N} topic)'
        required: true
        type: string
      file_id:
        description: 'Google Drive file ID'
        required: true
        type: string
      file_name:
        description: 'File name (e.g. "My Song.pdf")'
        required: false
        default: 'Test Song.pdf'
        type: string
      folder_id:
        description: 'Parent folder ID'
        required: false
        default: ''
        type: string
      mime_type:
        description: 'MIME type of the file'
        required: false
        default: 'application/pdf'
        type: string
      properties:
        description: 'Existing file properties as JSON (e.g. {"status":"APPROVED"})'
        required: false
        default: '{}'
        type: string

jobs:
  trigger-tagupdater:
    name: Publish Test File Change to Tag Updater
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup GCP and dependencies
      uses: ./.github/actions/setup-gcp-deps
      with:
        gcp_sa_key: ${{ secrets.GCP_SA_KEY }}
        gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

    - name: Build and publish message
      run: |
        PR_NUM="${{ github.event.inputs.pr_number }}"
        TOPIC="${{ env.DRIVE_CHANGES_PUBSUB_TOPIC }}-pr-${PR_NUM}"

        FILE_ID="${{ github.event.inputs.file_id }}"
        FILE_NAME="${{ github.event.inputs.file_name }}"
        FOLDER_ID="${{ github.event.inputs.folder_id }}"
        MIME_TYPE="${{ github.event.inputs.mime_type }}"
        PROPERTIES='${{ github.event.inputs.properties }}'

        # Build parents array — empty if no folder_id provided
        if [ -n "$FOLDER_ID" ]; then
          PARENTS_JSON="[\"${FOLDER_ID}\"]"
        else
          PARENTS_JSON="[]"
        fi

        CHECK_TIME="$(date -u +%Y-%m-%dT%H:%M:%S)"

        MESSAGE=$(jq -n \
          --arg check_time "$CHECK_TIME" \
          --arg file_id "$FILE_ID" \
          --arg file_name "$FILE_NAME" \
          --arg folder_id "$FOLDER_ID" \
          --arg mime_type "$MIME_TYPE" \
          --argjson parents "$PARENTS_JSON" \
          --argjson properties "$PROPERTIES" \
          '{
            check_time: $check_time,
            file_count: 1,
            folders_checked: (if $folder_id != "" then [$folder_id] else [] end),
            changed_files: [{
              id: $file_id,
              name: $file_name,
              folder_id: $folder_id,
              mime_type: $mime_type,
              parents: $parents,
              properties: $properties
            }]
          }')

        echo "Publishing to topic: ${TOPIC}"
        echo "Message: ${MESSAGE}"

        gcloud pubsub topics publish "${TOPIC}" \
          --project="${{ env.GCP_PROJECT_ID }}" \
          --message="${MESSAGE}"
