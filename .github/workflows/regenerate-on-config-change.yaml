name: Regenerate Songbooks on Config Change

on:
  push:
    branches:
      - main
    paths:
      - 'generator/config/songbooks/**'
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - 'generator/config/songbooks/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    name: Detect Changed Editions
    runs-on: ubuntu-latest
    outputs:
      editions: ${{ steps.get-editions.outputs.editions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed editions
        id: get-editions
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only \
              "${{ github.event.pull_request.base.sha }}...HEAD" \
              -- generator/config/songbooks/)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD \
              -- generator/config/songbooks/)
          fi
          echo "Changed files: $CHANGED"
          EDITIONS=$(echo "$CHANGED" \
            | grep -oP 'generator/config/songbooks/\K[^.]+(?=\.ya?ml)' \
            | jq -R . | jq -s . | jq -c .)
          echo "Changed editions: $EDITIONS"
          echo "editions=$EDITIONS" >> $GITHUB_OUTPUT

  generate:
    name: Generate (${{ matrix.edition }})
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.editions != '[]' &&
      needs.detect-changes.outputs.editions != ''
    strategy:
      matrix:
        edition: ${{ fromJSON(needs.detect-changes.outputs.editions) }}
      fail-fast: false
    uses: ./.github/workflows/generate-songbook.yaml
    with:
      edition: ${{ matrix.edition }}
    secrets: inherit

  notify-pr:
    name: Post PR Preview Comment
    runs-on: ubuntu-latest
    needs: [detect-changes, generate]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.editions != '[]' &&
      needs.detect-changes.outputs.editions != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const editions = ${{ needs.detect-changes.outputs.editions }};
            const generateResult = '${{ needs.generate.result }}';

            const editionList = editions.map(e => `- **${e}**`).join('\n');

            let statusLine;
            if (generateResult === 'success') {
              statusLine = `âś… Generation succeeded. đź“Ą Download the preview PDFs from the [workflow run artifacts](${runUrl}).`;
            } else {
              statusLine = `âťŚ Generation failed. Check the [workflow run](${runUrl}) for details.`;
            }

            const marker = '<!-- songbook-preview-comment -->';
            const body = [
              '## đź“š Songbook Preview',
              '',
              'The following edition(s) were regenerated due to config changes in this PR:',
              '',
              editionList,
              '',
              statusLine,
              '',
              '> _These PDFs are for preview only and will not be published to',
              '> production until this PR is merged._',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.data.find(c => c.body.includes(marker));
            const commentBody = `${marker}\n${body}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }
