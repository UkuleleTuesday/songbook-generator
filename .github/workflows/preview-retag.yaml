name: Preview Retag Diff

# Show the pre/post diff of rerunning the auto-tagger against a PR's isolated
# Firestore database (pr-<N>), WITHOUT writing anything. This is a read-only
# preview: it runs the tagger in --dry-run mode, so neither the preview database
# nor production (nor Drive) is mutated. Production backfill is a separate,
# deliberate step (`tags update --all --retag <keys>` after merge).
#
# Trigger this from the PR branch so the tagger code under review (e.g. an
# updated prompt) is the code that runs.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to target (selects the pr-<N> Firestore database to diff against)'
        required: true
        type: string
      retag:
        description: 'Comma-separated tag keys to diff (e.g. theme)'
        required: true
        type: string
        default: theme

permissions:
  contents: read

jobs:
  preview-retag-diff:
    name: Diff retag of pr-${{ inputs.pr_number }} (${{ inputs.retag }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Read from the per-PR database so the diff reflects that preview's data.
      FIRESTORE_DATABASE: "pr-${{ inputs.pr_number }}"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup GCP and dependencies
      uses: ./.github/actions/setup-gcp-deps
      with:
        gcp_sa_key: ${{ secrets.GCP_SA_KEY }}
        gcp_project_id: ${{ vars.GCP_PROJECT_ID }}

    - name: Guard - require an isolated pr-<N> database
      run: |
        set -euo pipefail
        if [[ ! "${{ inputs.pr_number }}" =~ ^[0-9]+$ ]]; then
          echo "::error::pr_number must be a positive integer (got '${{ inputs.pr_number }}')."
          exit 1
        fi
        if [[ "${FIRESTORE_DATABASE}" != pr-* ]]; then
          echo "::error::FIRESTORE_DATABASE='${FIRESTORE_DATABASE}' is not a pr-<N> database; refusing to run."
          exit 1
        fi
        echo "Diffing against Firestore database: ${FIRESTORE_DATABASE}"
        # Fail early with a clear message if the preview database doesn't exist
        # (it is created when the PR is opened by deploy.yaml).
        if ! gcloud firestore databases describe \
            --database="${FIRESTORE_DATABASE}" \
            --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
          echo "::error::Firestore database '${FIRESTORE_DATABASE}' not found. Open/redeploy PR #${{ inputs.pr_number }} first."
          exit 1
        fi

    - name: Diff (dry-run, no writes)
      run: |
        set -euo pipefail
        echo "Computing dry-run diff for retag keys: ${{ inputs.retag }}"
        # --dry-run guarantees the tagger writes nothing to Firestore or Drive;
        # it only prints the computed old -> new changes.
        uv run songbook-tools tags update --all \
          --retag "${{ inputs.retag }}" \
          --dry-run --verbose 2>&1 | tee retag-dryrun.txt
        {
          echo "### Retag dry-run diff (pr-${{ inputs.pr_number }}, keys: ${{ inputs.retag }})"
          echo ""
          echo '```'
          cat retag-dryrun.txt
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload dry-run diff artifact
      uses: actions/upload-artifact@v4
      with:
        name: retag-dryrun-pr-${{ inputs.pr_number }}
        path: retag-dryrun.txt
        if-no-files-found: error
