name: Monopolele Songbook Cronjob

on:
  schedule:
    # Run every hour
    - cron: "0 * * * *"
  workflow_dispatch: {} # For manual runs

permissions:
  contents: read

jobs:
  generate-monopolele-songbook:
    name: Generate Monopolele Songbook
    uses: ./.github/workflows/generate-songbook.yaml
    with:
      edition: "monopolele-2026"
    secrets: inherit
