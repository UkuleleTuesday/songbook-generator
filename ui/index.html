<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Songbook Chef</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/getmdl-select@2.0.1/getmdl-select.min.css">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">
    <main class="mdl-layout__content">
      <div class="mdl-card mdl-shadow--2dp">
        <div class="mdl-card__title">
          <h3>Songbook Chef</h3>
          <img src="img/logo.png" alt="Songbook Chef Logo" style="width: 50%; height: auto; margin: auto;" />
          <p>
            Songbook Chef is an experimental songbook generator for Ukulele Tuesday.
            Issue reports, pull requests or improvement suggestions are welcome on
            <a href="https://github.com/jjst/songbook-generator" target="_blank">GitHub</a>.
          </p>
        </div>
        <div class="mdl-card__actions">
          <div class="mdl-tabs mdl-js-tabs mdl-js-ripple-effect">
            <div class="mdl-tabs__tab-bar">
              <a href="#generator-panel" id="generator-tab" class="mdl-tabs__tab is-active">Generate</a>
              <a href="#history-panel" id="history-tab" class="mdl-tabs__tab" style="display: none;">History</a>
            </div>

            <section class="mdl-tabs__panel is-active" id="generator-panel">
              <form id="jobForm" style="text-align: left;">
                <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label getmdl-select">
                  <input class="mdl-textfield__input" value="" id="songbook-edition" readonly />
                  <input value="" type="hidden" name="songbook_edition" />
                  <label class="mdl-textfield__label" for="songbook-edition">Songbook Edition</label>
                  <ul class="mdl-menu mdl-menu--bottom-left mdl-js-menu" for="songbook-edition" id="edition-menu">
                    <li class="mdl-menu__item mdl-menu__item--disabled" id="editions-loading">Loading editions…</li>
                    <li class="mdl-menu__item" data-val="__drive_folder__">Other (Drive folder ID)...</li>
                  </ul>
                </div>
                <div id="editions-error" style="display: none; color: #c62828; font-size: 0.85rem; margin-top: 0.25rem;"></div>
                <div id="drive-folder-section" style="display: none;">
                  <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width: 100%;">
                    <input class="mdl-textfield__input" type="text" id="drive-folder-id" name="drive_folder_id" />
                    <label class="mdl-textfield__label" for="drive-folder-id">Drive Folder ID</label>
                  </div>
                </div>
                <details style="margin: 1rem 0;">
                  <summary>Advanced Settings</summary>
                  <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                    <input class="mdl-textfield__input" type="text" id="folders" name="source_folders" value="1b_ZuZVOGgvkKVSUypkbRwBsXLVQGjl95,1bvrIMQXjAxepzn4Vx8wEjhk3eQS5a9BM" required />
                    <label class="mdl-textfield__label" for="folders">Folder IDs</label>
                  </div>
                  <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                    <input class="mdl-textfield__input" type="text" id="cover" name="cover_file_id" value="1rxn4Kl6fe-SUFqfYieb5FrxkVwHLLVPbwOXtWRGc740" />
                    <label class="mdl-textfield__label" for="cover">Cover File ID (optional)</label>
                  </div>
                  <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                    <input class="mdl-textfield__input" type="number" id="limit" name="limit" value="0" min="0" max="500" />
                    <label class="mdl-textfield__label" for="limit">Limit</label>
                  </div>
                </details>
                <button type="submit" id="submitButton" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--accent" style="width: 100%;">
                  Generate Songbook!
                </button>
              </form>
            </section>
            <section class="mdl-tabs__panel" id="history-panel">
              <div id="historyContainer">
                <ul id="historyList" class="mdl-list"></ul>
              </div>
            </section>
          </div>
        </div>
        <div id="progressContainer" style="display: none; padding: 1rem;">
          <div id="progressBar" class="mdl-progress mdl-js-progress mdl-progress__indeterminate"></div>
          <div id="progressText" style="font-size: 0.9rem; color: #666; margin-top: 0.5rem;">Starting...</div>
          <div id="progressPercentage" style="font-weight: bold; margin-top: 0.25rem;">0%</div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/getmdl-select@2.0.1/getmdl-select.min.js"></script>
  <script>
    const DRIVE_FOLDER_EDITION = '__drive_folder__';

    function getApiBase() {
      const currentPath = window.location.pathname;
      const prMatch = currentPath.match(/\/pr-preview\/pr-(\d+)\//);
      if (prMatch) {
        const prNumber = prMatch[1];
        return `https://europe-west1-songbook-generator.cloudfunctions.net/songbook-generator-api-pr-${prNumber}`;
      }
      return "https://europe-west1-songbook-generator.cloudfunctions.net/songbook-generator-api";
    }

    const apiBase = getApiBase();
    const submitButton = document.getElementById('submitButton');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const progressPercentage = document.getElementById('progressPercentage');
    const historyTab = document.getElementById('history-tab');
    const historyList = document.getElementById('historyList');

    function renderHistory() {
      let songbooks = JSON.parse(localStorage.getItem('generatedSongbooks') || '[]');

      // TTL items older than 60 days
      const sixtyDaysAgo = new Date();
      sixtyDaysAgo.setDate(sixtyDaysAgo.getDate() - 60);

      const recentSongbooks = songbooks.filter(songbook => {
        const songbookDate = new Date(songbook.date);
        return songbookDate >= sixtyDaysAgo;
      });

      if (recentSongbooks.length < songbooks.length) {
        songbooks = recentSongbooks;
        localStorage.setItem('generatedSongbooks', JSON.stringify(songbooks));
      }

      if (songbooks.length > 0) {
        historyList.innerHTML = '';
        songbooks.forEach(songbook => {
          const li = document.createElement('li');
          li.className = 'mdl-list__item';

          const primaryContent = document.createElement('span');
          primaryContent.className = 'mdl-list__item-primary-content';

          const icon = document.createElement('i');
          icon.className = 'material-icons mdl-list__item-icon';
          icon.textContent = 'book';
          primaryContent.appendChild(icon);

          const a = document.createElement('a');
          a.href = songbook.url;
          a.textContent = songbook.name;
          a.target = '_blank';
          primaryContent.appendChild(a);

          li.appendChild(primaryContent);
          historyList.appendChild(li);
        });
        historyTab.style.display = 'inline-block';
      } else {
        historyTab.style.display = 'none';
      }
    }

    function addSongbookToHistory(name, url) {
      const songbooks = JSON.parse(localStorage.getItem('generatedSongbooks') || '[]');
      // To keep the list clean, we'll limit it to the last 10 generated songbooks
      const newSongbooks = [{ name, url, date: new Date().toISOString() }, ...songbooks].slice(0, 10);
      localStorage.setItem('generatedSongbooks', JSON.stringify(newSongbooks));
      renderHistory();
    }

    function setIndeterminate(indeterminate) {
      if (indeterminate) {
        progressBar.classList.add('mdl-progress__indeterminate');
      } else {
        progressBar.classList.remove('mdl-progress__indeterminate');
      }
    }

    function updateProgress(progress, message) {
      const percentage = Math.round(progress * 100);
      if (progress > 0) {
        setIndeterminate(false);
      }
      if (progressBar.MaterialProgress) {
        progressBar.MaterialProgress.setProgress(percentage);
      }
      progressPercentage.textContent = percentage + '%';
      if (message) {
        progressText.textContent = message;
      }
    }

    function showProgress() {
      progressContainer.style.display = 'block';
      setIndeterminate(true);
      updateProgress(0, 'Starting...');
    }

    function hideProgress() {
      progressContainer.style.display = 'none';
    }

    function enableSubmitButton() {
      submitButton.disabled = false;
      submitButton.textContent = 'Generate Songbook!';
    }

    function disableSubmitButton() {
      submitButton.disabled = true;
      submitButton.textContent = 'Generating...';
    }

    function getDecadeRange(decade) {
      const decadeMap = {
        '1950s': { start: 1950, end: 1959 },
        '1960s': { start: 1960, end: 1969 },
        '1970s': { start: 1970, end: 1979 },
        '1980s': { start: 1980, end: 1989 },
        '1990s': { start: 1990, end: 1999 },
        '2000s': { start: 2000, end: 2009 },
        '2010s': { start: 2010, end: 2019 },
        '2020s': { start: 2020, end: 2029 }
      };
      return decadeMap[decade];
    }

    async function pollStatus(jobId) {
      const statusUrl = `${apiBase}/${jobId}`;
      while (true) {
        const res = await fetch(statusUrl, { method: 'GET' });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || res.statusText);
        }
        const data = await res.json();
        const { status, result_url, progress, last_message } = data;

        // Update progress if available
        if (typeof progress === 'number') {
          updateProgress(progress, last_message || `Status: ${status}`);
        } else {
          progressText.textContent = `Status: ${status}`;
        }

        if (status === 'completed') {
          updateProgress(1.0, 'Completed! Starting download...');
          return result_url;
        }
        if (status === 'failed') {
          throw new Error('Job failed on server');
        }
        // wait before next poll
        await new Promise(r => setTimeout(r, 1000));
      }
    }

    /**
     * Attach click handlers for all edition menu items so that:
     * - the hidden input and visible input are updated
     * - the Drive folder section is shown/hidden appropriately
     */
    function attachEditionMenuHandlers() {
      document.querySelectorAll('#edition-menu .mdl-menu__item[data-val]').forEach(function(item) {
        if (item.classList.contains('mdl-menu__item--disabled')) return;
        item.addEventListener('click', function() {
          const driveFolderSection = document.getElementById('drive-folder-section');
          if (this.getAttribute('data-val') === DRIVE_FOLDER_EDITION) {
            driveFolderSection.style.display = 'block';
            const textfield = driveFolderSection.querySelector('.mdl-textfield');
            if (textfield && typeof componentHandler !== 'undefined') {
              componentHandler.upgradeElement(textfield);
            }
          } else {
            driveFolderSection.style.display = 'none';
          }
        });
      });
    }

    /**
     * Populate the edition dropdown from the API response.
     * Falls back gracefully if the API is unavailable.
     */
    async function loadEditions() {
      const loadingItem = document.getElementById('editions-loading');
      const editionMenu = document.getElementById('edition-menu');
      const editionsError = document.getElementById('editions-error');
      const editionInput = document.querySelector('input[name="songbook_edition"]');
      const editionDisplay = document.getElementById('songbook-edition');

      try {
        const res = await fetch(`${apiBase}/editions`, { method: 'GET' });
        if (!res.ok) throw new Error(`API returned ${res.status}`);
        const data = await res.json();
        const editions = data.editions || [];

        // Remove the loading placeholder
        if (loadingItem) loadingItem.remove();

        if (editions.length === 0) {
          editionsError.textContent = 'No editions found. Enter a Drive folder ID below.';
          editionsError.style.display = 'block';
          // Select "Other (Drive folder ID)" so the form is still usable
          editionInput.value = DRIVE_FOLDER_EDITION;
          document.getElementById('drive-folder-section').style.display = 'block';
        } else {
          // Insert edition items before the "Other" option
          const otherItem = editionMenu.querySelector('[data-val="__drive_folder__"]');
          editions.forEach((edition, index) => {
            const li = document.createElement('li');
            li.className = 'mdl-menu__item';
            li.setAttribute('data-val', edition.id);
            if (edition.description) {
              li.setAttribute('title', edition.description);
            }
            const titleSpan = document.createElement('span');
            titleSpan.textContent = edition.title;
            li.appendChild(titleSpan);
            if (edition.source) {
              const badge = document.createElement('span');
              badge.textContent = edition.source;
              badge.style.cssText =
                'margin-left:6px;font-size:0.7rem;padding:1px 5px;' +
                'border-radius:3px;vertical-align:middle;font-weight:600;' +
                (edition.source === 'drive'
                  ? 'background:#e3f2fd;color:#1565c0;'
                  : 'background:#f3e5f5;color:#6a1b9a;');
              li.appendChild(badge);
            }
            editionMenu.insertBefore(li, otherItem);

            // Select the first edition by default
            if (index === 0) {
              editionInput.value = edition.id;
              editionDisplay.value = edition.title;
            }
          });

          // Show a notice if Drive scanning had errors
          if (data.drive_error) {
            editionsError.textContent =
              'Note: Drive edition scanning encountered an error. ' +
              'Some drive-based editions may not be listed.';
            editionsError.style.display = 'block';
          }
        }

        // Re-upgrade MDL components and re-attach handlers after DOM changes
        if (typeof componentHandler !== 'undefined') {
          componentHandler.upgradeDom();
        }
        attachEditionMenuHandlers();

      } catch (err) {
        if (loadingItem) loadingItem.remove();
        editionsError.textContent =
          'Could not load editions from the API. ' +
          'You can still use a Drive folder ID below.';
        editionsError.style.display = 'block';
        // Select "Other (Drive folder ID)" so the form is still usable
        editionInput.value = DRIVE_FOLDER_EDITION;
        document.getElementById('drive-folder-section').style.display = 'block';
        attachEditionMenuHandlers();
      }
    }

    document.getElementById("jobForm").onsubmit = async (e) => {
      e.preventDefault();

      // Disable submit button and show progress
      disableSubmitButton();
      showProgress();

      const form = new FormData(e.target);

      // Parse comma-separated folder IDs
      const foldersInput = form.get("source_folders");
      const folderIds = foldersInput.split(',').map(id => id.trim()).filter(id => id.length > 0);

      const payload = {
        source_folders: folderIds,
      };

      const limitVal = Number(form.get("limit"));
      if (limitVal > 0) {
        payload.limit = limitVal;
      }

      const coverFileId = form.get("cover_file_id");
      if (coverFileId) {
        payload.cover_file_id = coverFileId;
      }

      const songbookEdition = form.get("songbook_edition");
      const driveFolderId = form.get("drive_folder_id");

      // Validate: require either a selected edition or a Drive folder ID
      if (!songbookEdition && !driveFolderId) {
        enableSubmitButton();
        hideProgress();
        alert("Please select an edition or enter a Drive folder ID.");
        return;
      }

      payload.edition = (songbookEdition === DRIVE_FOLDER_EDITION && driveFolderId)
        ? driveFolderId
        : songbookEdition;

      try {
        // submit job
        updateProgress(0, 'Submitting job...');
        const submitRes = await fetch(apiBase, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!submitRes.ok) throw new Error(submitRes.statusText);
        const { job_id } = await submitRes.json();

        updateProgress(0, 'Job submitted, waiting for processing...');

        // poll until done
        const downloadUrl = await pollStatus(job_id);

        // download PDF
        updateProgress(1.0, 'Downloading PDF...');
        const a = document.createElement("a");
        a.href = downloadUrl;
        a.download = "songbook.pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        updateProgress(1.0, 'Download started!');

        // Add to history
        const editionInput = document.querySelector('input[name="songbook_edition"]');
        const selectedOption = document.querySelector(`#edition-menu .mdl-menu__item[data-val="${editionInput.value}"]`);
        const currentDriveFolderId = document.getElementById('drive-folder-id').value;
        let editionText;
        if (editionInput.value === DRIVE_FOLDER_EDITION && currentDriveFolderId) {
          editionText = `Drive folder: ${currentDriveFolderId}`;
        } else {
          const titleEl = selectedOption && selectedOption.querySelector('span');
          editionText = titleEl ? titleEl.textContent : (selectedOption ? selectedOption.textContent : 'Custom');
        }
        const songbookName = `Edition: ${editionText} - Generated on ${new Date().toLocaleString('en-GB')}`;
        addSongbookToHistory(songbookName, downloadUrl);

      } catch (err) {
        updateProgress(0, `Error: ${err.message}`);
        alert("Error: " + err.message);
      } finally {
        enableSubmitButton();
        // Hide progress after a delay to let user see final status
        setTimeout(() => {
          hideProgress();
        }, 3000);
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      renderHistory();
      // Manually upgrade any dynamically added MDL components if needed
      if (typeof componentHandler !== 'undefined') {
        componentHandler.upgradeDom();
      }

      // Load editions from the API (populates the dropdown dynamically)
      loadEditions();
    });
  </script>
</body>
</html>
