id: "pride"
title: "Ukulele Tuesday - Pride Songbook"
description: >
  A Pride edition of the Ukulele Tuesday songbook, containing only the
  Pride-flagged tunes from the current Tuesday songbook.

  This is the subset of the current songbook that carries the rainbow flag in
  its table of contents: tunes tagged with a `pride` theme, plus a handful
  included because they qualify by artist identity rather than lyrical content.
publish:
  visibility: unlisted
  pinned: false
sections:
  # Reuse the existing Pride cover. Replace with a dedicated cover if desired.
  cover:
    file_id: "1l0YGV0UD-ZxTrsuaY8WcMlHybrhz3BdpgIKqhTEyRLY"
  songs:
    # Explicit, curated list of the Pride-flagged songs in the current Tuesday
    # songbook. Kept in sync by hand with current.yaml's `pride-flag` TOC
    # decoration (theme=pride songs + the by-name pins). Prefer an explicit
    # list over a dynamic `theme contains "pride"` filter so the selection is
    # predictable and renders fully in PR previews (whose isolated Firestore
    # has no theme metadata).
    filters:
      - key: "name"
        operator: "in"
        value:
          - "9 to 5 - Dolly Parton"
          - "Baby One More Time - Britney Spears"
          - "Basket Case - Green Day"
          - "BIRDS OF A FEATHER - Billie Eilish"
          - "Call Me - Blondie"
          - "Call Me Maybe - Carly Rae Jepsen"
          - "Can't Get You out of My Head - Kylie Minogue"
          - "Cheap Thrills - Sia"
          - "Don't Stop Me Now - Queen"
          - "Faith - George Michael"
          - "Flowers - Miley Cyrus"
          - "Hand in My Pocket - Alanis Morissette"
          - "Heroes (single version) - David Bowie"
          - "Holding Out for a Hero - Bonnie Tyler"
          - "Hot Stuff (Single Version) - Donna Summer"
          - "I Love It (feat. Charli XCX) - Icona Pop"
          - "I Only Want To Be With You - Dusty Springfield"
          - "I Will Survive - Gloria Gaynor"
          - "In Bloom - Nirvana"
          - "Jolene - Dolly Parton"
          - "Just A Girl - No Doubt"
          - "Just Can't Get Enough - Depeche Mode"
          - "Karma Chameleon - Culture Club"
          - "Kiss/Mustang Sally Medley - Prince/The Commitments"
          - "Man! I Feel Like A Woman! - Shania Twain"
          - "Material Girl - Madonna"
