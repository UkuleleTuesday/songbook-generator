id: "pride-2026"
title: "Ukulele Tuesday - Pride 2026"
description: >
  A dedicated Pride edition: every song flagged as Pride in the current
  Tuesday songbook, and only those. Happy Pride! 🏳️‍🌈
publish:
  visibility: unlisted
sections:
  cover:
    file_id: "1v7JMZ84h_cLObsqBa8vL-25FxZIxcLERrw06pULa1kM"
  table_of_contents:
    # Single, generously-sized column that fills the TOC page (mirrors the
    # Ukulele Hooley 2025 layout): larger text, roomier line spacing, and no
    # difficulty/WIP markers.
    include_difficulty: false
    include_wip_marker: false
    columns_per_page: 1
    column_width: 360
    margin_left: 120
    margin_right: 120
    margin_top: 10
    margin_bottom: 10
    # Sized so all songs fit on a single TOC page (font dropped half a point,
    # line spacing tightened to pack the full list onto one page).
    text_fontsize: 11.5
    line_spacing: 14
    # Flag only songs whose credited artist is openly LGBTQ+ (pride by artist
    # identity), as distinct from the rest of the book which is pride by song
    # theme/association. Hand-curated — there is no orientation field in the
    # song metadata to filter on.
    decorations:
      - badges:
          - symbol: pride-flag
        filters:
          - key: "name"
            operator: "in"
            value:
              - "Basket Case - Green Day"               # Billie Joe Armstrong (bi)
              - "BIRDS OF A FEATHER - Billie Eilish"     # Billie Eilish (queer)
              - "Call Me - Blondie"                       # Debbie Harry (bi)
              - "Cheap Thrills - Sia"                     # Sia (queer)
              - "Crocodile Rock - Elton John"             # Elton John (gay)
              - "Don't Stop Me Now - Queen"               # Freddie Mercury (queer)
              - "Faith - George Michael"                  # George Michael (gay)
              - "Flowers - Miley Cyrus"                   # Miley Cyrus (pansexual)
              - "Grace Kelly - MIKA"                      # MIKA (gay)
              - "Heroes (single version) - David Bowie"   # David Bowie (bi)
              - "I Only Want To Be With You - Dusty Springfield"  # Dusty Springfield (bi)
              - "I Want to Break Free - Queen"            # Freddie Mercury (queer)
              - "Karma Chameleon - Culture Club"          # Boy George (gay)
              - "King for a Day - Green Day"              # Billie Joe Armstrong (bi)
              - "Nancy Boy - Placebo"                     # Brian Molko (bi)
              - "One Way or Another - Blondie"            # Debbie Harry (bi)
              - "Red Wine Supernova - Chappell Roan"      # Chappell Roan (lesbian)
              - "Space Oddity - David Bowie"              # David Bowie (bi)
              - "Talkin' Bout a Revolution - Tracy Chapman"  # Tracy Chapman (queer)
              - "The Edge Of Glory (Radio Edit) - Lady Gaga"  # Lady Gaga (bi)
              - "Time Warp - Little Nell, Patricia Quinn, Richard O'Brien"  # Richard O'Brien (trans/third-gender)
              - "Tree Hugger - Kimya Dawson & Antsy Pants"  # Kimya Dawson (genderfluid/nonbinary)
              - "True Trans Soul Rebel - Against Me!"     # Laura Jane Grace (trans)
              - "What's Up? - 4 Non Blondes"              # Linda Perry (lesbian)
              - "Wrecking Ball - Miley Cyrus"             # Miley Cyrus (pansexual)
  songs:
    filters:
      # The exact set of songs that carry the pride flag in the current
      # songbook's TOC (theme contains "pride" OR pinned in the current
      # edition's #425 name-list workaround), and only those.
      - key: "name"
        operator: "in"
        value:
          - "9 to 5 - Dolly Parton"
