id: "pride-candidates"
title: "Ukulele Tuesday - Pride Candidates"
description: >
  All Pride-relevant songs from the Ukulele Tuesday catalogue.
  Songs already confirmed for the Pride special edition are shown in grey (✓).
  The remaining songs are the voteable candidates for the curation poll.
